# PROJECT TITAN — local Postgres for the fiat-acquiring ledger.
# Matches DATABASE_URL=postgres://titan:password@localhost:5432/titan in .env.
#   docker compose up -d
services:
  postgres:
    image: postgres:16
    container_name: titan-postgres
    environment:
      POSTGRES_USER: titan
      POSTGRES_PASSWORD: password
      POSTGRES_DB: titan
    ports:
      - "5432:5432"
    volumes:
      - titan_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titan -d titan"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  titan_pg:
